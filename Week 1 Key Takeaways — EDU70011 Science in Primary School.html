<style>
  html,body{margin:0;padding:0;background:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
  .stage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 0;}
  .phone{width:300px;background:#0a0a0a;border-radius:32px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .screen{background:#fff;border-radius:24px;overflow:hidden;height:540px;display:flex;flex-direction:column;position:relative;}
  .segs{display:flex;gap:4px;padding:10px 12px 0;}
  .seg{flex:1;height:4px;background:rgba(0,0,0,.12);border-radius:2px;overflow:hidden;}
  .segfill{display:block;height:100%;width:0%;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}

  .badge{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .badge svg{width:24px;height:24px;}
  .logo img{height:23px;width:auto;display:block;}
  .content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:14px 28px;}
  .tag{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin:0 0 12px;}
  .ttl{color:#16181c;font-size:21px;font-weight:500;line-height:1.3;margin:0 0 10px;}
  .sub{color:#3a3c40;font-size:13.5px;line-height:1.5;margin:0 0 8px;}
  .extra{color:#76787c;font-size:12.5px;line-height:1.5;margin:0;border-top:0.5px solid #ececec;padding-top:8px;}
  .diagramWrap{margin:2px 0 4px;}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 0 18px;}
  .ctrls button{background:none;border:none;cursor:pointer;color:#54565a;padding:6px;}
  .ctrls button svg{width:20px;height:20px;display:block;}
  .ctrls button:hover{color:#16181c;}
  .timer{position:absolute;top:9px;right:16px;font-size:9px;color:#bdbdbd;}
  @media (max-width:340px){.phone{width:94vw;}}
</style>

function wordCount(c){return (c.tag+' '+c.title+' '+c.sub+' '+c.extra).trim().split(/\s+/).length;}
const durs=CARDS.map(c=>Math.max(8000,Math.min(16000,3000+wordCount(c)*380)));
document.getElementById('timer').textContent=CARDS.length+' cards \u00b7 ~'+Math.round(durs.reduce((a,b)=>a+b,0)/1000)+'s total';
document.getElementById('playBtn').innerHTML=ICONS.pause;
document.getElementById('btnPrev').innerHTML=ICONS.prev;
document.getElementById('btnNext').innerHTML=ICONS.next;
const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let idx=0,playing=true,timer;
const segs=document.getElementById('segs');
segs.innerHTML=CARDS.map((_,i)=>'<div class="seg"><span class="segfill" id="seg'+i+'"></span></div>').join('');
function reveal(id,delay){
  const el=document.getElementById(id);
  if(!el)return;
  if(reduceMotion){el.style.opacity=1;el.style.animation='none';return;}
  el.style.opacity=0;
  el.style.animation='none';
  void el.offsetWidth;
  el.style.animation='fadeUp .45s ease-out '+delay+'s both';
}
function renderCard(){
  const c=CARDS[idx];
  document.getElementById('tag').textContent=c.tag;
  document.getElementById('tag').style.color=c.accent;
  document.getElementById('ttl').textContent=c.title;
  document.getElementById('badge').style.background=c.accent+'22';
  document.getElementById('badge').innerHTML='<span style="color:'+c.accent+';display:flex;">'+ICONS[c.icon]+'</span>';
  const dWrap=document.getElementById('diagramWrap'),subEl=document.getElementById('sub'),extraEl=document.getElementById('extra');
  if(idx===DIAGRAM_CARD_INDEX){
    dWrap.innerHTML=DIAGRAM_SVG;
    dWrap.style.display='block';
    subEl.style.display='none';
    extraEl.style.display='none';
    reveal('tag',0); reveal('ttl',0.15); reveal('diagramWrap',0.6);
  } else {
    dWrap.style.display='none';
    subEl.style.display='block';
    extraEl.style.display='block';
    subEl.textContent=c.sub;
    extraEl.textContent=c.extra;
    reveal('tag',0); reveal('ttl',0.15); reveal('sub',0.85); reveal('extra',1.5);
  }
  for(let i=0;i<CARDS.length;i++){
    const el=document.getElementById('seg'+i);
    el.style.animation='none';
    el.style.background=CARDS[i].accent;
    if(i<idx){el.style.width='100%';}
    else if(i===idx){
      el.style.width='0%';
      void el.offsetWidth;
      el.style.animation='fillSeg '+durs[i]+'ms linear forwards';
      el.style.animationPlayState=playing?'running':'paused';
    } else {el.style.width='0%';}
  }
}
function schedule(){
  clearTimeout(timer);
  if(playing){timer=setTimeout(()=>{idx=(idx+1)%CARDS.length;renderCard();schedule();},durs[idx]);}
}
function togglePlay(){
  playing=!playing;
  document.getElementById('playBtn').innerHTML=playing?ICONS.pause:ICONS.play;
  const el=document.getElementById('seg'+idx);
  el.style.animationPlayState=playing?'running':'paused';
  schedule();
}
function nextCard(){idx=(idx+1)%CARDS.length;renderCard();schedule();}
function prevCard(){idx=(idx-1+CARDS.length)%CARDS.length;renderCard();schedule();}
renderCard();
schedule();
</script>
