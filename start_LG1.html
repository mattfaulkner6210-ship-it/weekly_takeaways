<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start LG1</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .start-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 320px;
    max-width: 90vw;
    padding: 16px 28px;
    border-radius: 50px;
    background: linear-gradient(90deg, #C8102E 0%, #FF6A00 100%);
    color: #ffffff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-decoration: none;
    text-transform: uppercase;
    box-shadow: 0 6px 16px rgba(200, 16, 46, 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .start-btn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 22px rgba(200, 16, 46, 0.45);
  }

  .start-btn:active {
    transform: translateY(0) scale(0.99);
  }

  .start-btn .arrow {
    font-size: 20px;
    transition: transform 0.15s ease;
  }

  .start-btn:hover .arrow {
    transform: translateX(4px);
  }
</style>
</head>
<body>

<div class="wrap">
  <a class="start-btn" href="https://swinburneonline.instructure.com/groups/84505/discussion_topics/1155230" target="_top">
    Start <span class="arrow">&#8594;</span>
  </a>
</div>

</body>
</html>
